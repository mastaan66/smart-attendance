version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: smart_campus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    restart: always
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD is required}@postgres:5432/smart_campus
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ML_SERVICE_URL=${ML_SERVICE_URL:?ML_SERVICE_URL is required}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      - NEXTAUTH_URL=${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      - UNIVERSITY_ONBOARDING_TOKEN=${UNIVERSITY_ONBOARDING_TOKEN:?UNIVERSITY_ONBOARDING_TOKEN is required}
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
